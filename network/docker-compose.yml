version: '3.7'

networks:
  dakar_net:
    name: dakar_net

volumes:
  orderer.dakar.sn:
  peer0.municipality.dakar.sn:
  peer1.municipality.dakar.sn:
  peer0.revenue.gouv.sn:
  peer0.observer.dakar.sn:
  couchdb0:
  couchdb1:
  couchdb2:
  couchdb3:

services:

  # ─── Orderer ───────────────────────────────────────────────────────────────
  orderer.dakar.sn:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.dakar.sn
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:17050
    volumes:
      - ../crypto-config/ordererOrganizations/dakar.sn/orderers/orderer.dakar.sn/msp:/var/hyperledger/orderer/msp
      - ../crypto-config/ordererOrganizations/dakar.sn/orderers/orderer.dakar.sn/tls:/var/hyperledger/orderer/tls
      - orderer.dakar.sn:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
      - "7053:7053"
      - "17050:17050"
    networks: [dakar_net]

  # ─── Municipality peers ────────────────────────────────────────────────────
  peer0.municipality.dakar.sn:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.municipality.dakar.sn
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=dakar_net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.municipality.dakar.sn
      - CORE_PEER_ADDRESS=peer0.municipality.dakar.sn:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.municipality.dakar.sn:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.municipality.dakar.sn:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.municipality.dakar.sn:7051
      - CORE_PEER_LOCALMSPID=MunicipalityMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:17051
      - CORE_PEER_GATEWAY_ENABLED=true
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../crypto-config/peerOrganizations/municipality.dakar.sn/peers/peer0.municipality.dakar.sn/msp:/etc/hyperledger/fabric/msp
      - ../crypto-config/peerOrganizations/municipality.dakar.sn/peers/peer0.municipality.dakar.sn/tls:/etc/hyperledger/fabric/tls
      - peer0.municipality.dakar.sn:/var/hyperledger/production
    ports:
      - "7051:7051"
      - "17051:17051"
    depends_on: [couchdb0, orderer.dakar.sn]
    networks: [dakar_net]

  peer1.municipality.dakar.sn:
    image: hyperledger/fabric-peer:2.5
    container_name: peer1.municipality.dakar.sn
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=dakar_net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer1.municipality.dakar.sn
      - CORE_PEER_ADDRESS=peer1.municipality.dakar.sn:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer1.municipality.dakar.sn:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.municipality.dakar.sn:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.municipality.dakar.sn:8051
      - CORE_PEER_LOCALMSPID=MunicipalityMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:18051
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../crypto-config/peerOrganizations/municipality.dakar.sn/peers/peer1.municipality.dakar.sn/msp:/etc/hyperledger/fabric/msp
      - ../crypto-config/peerOrganizations/municipality.dakar.sn/peers/peer1.municipality.dakar.sn/tls:/etc/hyperledger/fabric/tls
      - peer1.municipality.dakar.sn:/var/hyperledger/production
    ports:
      - "8051:8051"
    depends_on: [couchdb1, orderer.dakar.sn]
    networks: [dakar_net]

  # ─── National Revenue peer ─────────────────────────────────────────────────
  peer0.revenue.gouv.sn:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.revenue.gouv.sn
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=dakar_net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.revenue.gouv.sn
      - CORE_PEER_ADDRESS=peer0.revenue.gouv.sn:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.revenue.gouv.sn:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.revenue.gouv.sn:9051
      - CORE_PEER_LOCALMSPID=NationalRevenueMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb2:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:19051
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../crypto-config/peerOrganizations/revenue.gouv.sn/peers/peer0.revenue.gouv.sn/msp:/etc/hyperledger/fabric/msp
      - ../crypto-config/peerOrganizations/revenue.gouv.sn/peers/peer0.revenue.gouv.sn/tls:/etc/hyperledger/fabric/tls
      - peer0.revenue.gouv.sn:/var/hyperledger/production
    ports:
      - "9051:9051"
    depends_on: [couchdb2, orderer.dakar.sn]
    networks: [dakar_net]

  # ─── Civil Society observer peer ──────────────────────────────────────────
  peer0.observer.dakar.sn:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.observer.dakar.sn
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=dakar_net
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.observer.dakar.sn
      - CORE_PEER_ADDRESS=peer0.observer.dakar.sn:10051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:10051
      - CORE_PEER_CHAINCODEADDRESS=peer0.observer.dakar.sn:10052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:10052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.observer.dakar.sn:10051
      - CORE_PEER_LOCALMSPID=CivilSocietyMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb3:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:20051
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../crypto-config/peerOrganizations/observer.dakar.sn/peers/peer0.observer.dakar.sn/msp:/etc/hyperledger/fabric/msp
      - ../crypto-config/peerOrganizations/observer.dakar.sn/peers/peer0.observer.dakar.sn/tls:/etc/hyperledger/fabric/tls
      - peer0.observer.dakar.sn:/var/hyperledger/production
    ports:
      - "10051:10051"
    depends_on: [couchdb3, orderer.dakar.sn]
    networks: [dakar_net]

  # ─── CouchDB instances ─────────────────────────────────────────────────────
  couchdb0:
    image: couchdb:3.3.2
    container_name: couchdb0
    environment: [COUCHDB_USER=admin, COUCHDB_PASSWORD=adminpw]
    volumes: [couchdb0:/opt/couchdb/data]
    ports: ["5984:5984"]
    networks: [dakar_net]

  couchdb1:
    image: couchdb:3.3.2
    container_name: couchdb1
    environment: [COUCHDB_USER=admin, COUCHDB_PASSWORD=adminpw]
    volumes: [couchdb1:/opt/couchdb/data]
    ports: ["6984:5984"]
    networks: [dakar_net]

  couchdb2:
    image: couchdb:3.3.2
    container_name: couchdb2
    environment: [COUCHDB_USER=admin, COUCHDB_PASSWORD=adminpw]
    volumes: [couchdb2:/opt/couchdb/data]
    ports: ["7984:5984"]
    networks: [dakar_net]

  couchdb3:
    image: couchdb:3.3.2
    container_name: couchdb3
    environment: [COUCHDB_USER=admin, COUCHDB_PASSWORD=adminpw]
    volumes: [couchdb3:/opt/couchdb/data]
    ports: ["8984:5984"]
    networks: [dakar_net]
